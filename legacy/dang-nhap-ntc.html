<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Đăng nhập</title>
  <meta name="description" content="Đăng nhập Hệ thống quản lý văn bản — Tập đoàn Công nghiệp Cao su Việt Nam." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="login-ntc-body">
  <div class="ntc-login-page" id="main-content" role="main">
    <div class="ntc-login-row">
      <div class="ntc-login-col ntc-login-branding">
        <div class="ntc-login-logo-wrap">
          <img class="ntc-login-vrg-logo" src="assets/img/dang-nhap/logo-ntc.png" alt="Vietnam Rubber Group" width="80" height="80" />
        </div>
        <p class="ntc-login-lead">
          HỆ THỐNG QUẢN LÝ VĂN BẢN<br />
          <span class="ntc-brand-title">TẬP ĐOÀN CÔNG NGHIỆP CAO SU VIỆT NAM</span>
        </p>
        <ul class="ntc-login-support">
          <li>
            <span><i class="fa fa-phone" aria-hidden="true"></i>Số điện thoại hỗ trợ kỹ thuật: (028) 3997 2030</span>
          </li>
        </ul>
      </div>

      <div class="ntc-login-col ntc-login-form-wrap">
        <section class="ntc-login-portlet">
          <h1 class="ntc-login-title">Đăng nhập</h1>
          <form
            class="ntc-login-form"
            id="_58_fm"
            name="_58_fm"
            method="post"
            action="https://qlvbcs.vrg.vn/web/onedoor/login?p_p_id=58&amp;p_p_lifecycle=1&amp;p_p_state=normal&amp;p_p_mode=view&amp;p_p_col_id=column-2&amp;p_p_col_count=2&amp;_58_struts_action=%2Flogin%2Flogin"
            autocomplete="on"
          >
            <div class="ntc-field">
              <label class="ntc-label" for="_58_login">Tên hiển thị</label>
              <input class="ntc-input" id="_58_login" name="_58_login" type="text" value="" />
            </div>
            <div class="ntc-field">
              <label class="ntc-label" for="_58_password">Mật khẩu</label>
              <input class="ntc-input" id="_58_password" name="_58_password" type="password" />
            </div>
            <div class="ntc-remember-wrap">
              <label class="ntc-remember" for="_58_rememberMeCheckbox">
                <input id="_58_rememberMeCheckbox" name="_58_rememberMeCheckbox" type="checkbox" value="false" />
                Nhớ tôi
              </label>
            </div>
            <div class="ntc-btn-wrap">
              <button class="ntc-login-btn" type="submit">Đăng nhập</button>
            </div>
          </form>
        </section>
      </div>
    </div>
  </div>
</body>
</html>
